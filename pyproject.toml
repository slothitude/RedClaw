[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "redclaw"
version = "0.1.0"
description = "RedClaw — a minimal AI coding agent"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "rich>=13",
]

[project.scripts]
redclaw = "redclaw.__main__:main"

[tool.setuptools.packages.find]
include = ["redclaw*"]
